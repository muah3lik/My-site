<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Test 🎀</title>
    <style>
        :root { --primary-color: #ff85a1; }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #ffe5ec, #ffc2d1);
        }
        .container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 40px;
            border: 4px solid white;
            z-index: 10;
            text-align: center;
            width: 300px;
            box-shadow: 0 10px 30px rgba(255, 133, 161, 0.3);
        }
        h1 { color: #ff4d6d; font-size: 2rem; margin-bottom: 20px; }
        .buttons-container { position: relative; height: 100px; width: 100%; }
        button {
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        #yes { background: #ff85a1; color: white; transition: 0.3s; }
        #no {
            background: #ffcad4;
            color: #ff4d6d;
            position: fixed;
            transition: 0.1s linear;
            z-index: 999;
            white-space: nowrap;
        }
        #message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 30px;
            font-size: 2rem;
            color: #ff4d6d;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            z-index: 10000;
            text-align: center;
            border: 5px solid #ff85a1;
        }
        .heart {
            position: absolute;
            font-size: 25px;
            animation: floatUp 4s linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1>واش كتبغيني؟ 🎀🧸</h1>
        <div class="buttons-container">
            <button id="yes">آه كنبغيك 🌸</button>
            <button id="no">لا 🥺</button>
        </div>
    </div>

    <div id="message">ياي! حتى أنا كنبغيك 🧸💖</div>

    <script>
        const yesBtn = document.getElementById("yes");
        const noBtn = document.getElementById("no");
        const message = document.getElementById("message");
        const refusalTexts = ["لا 🥺", "عافاك؟ 🐥", "فكر عاود 🎀", "ميمكنش! 🍓", "والو؟ 🍭"];
        let count = 0;

        const moveButton = () => {
            const maxX = window.innerWidth - noBtn.offsetWidth - 30;
            const maxY = window.innerHeight - noBtn.offsetHeight - 30;
            const randomX = Math.max(30, Math.floor(Math.random() * maxX));
            const randomY = Math.max(30, Math.floor(Math.random() * maxY));
            
            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";
            noBtn.innerText = refusalTexts[count % refusalTexts.length];
            count++;

            let currentSize = parseInt(window.getComputedStyle(yesBtn).fontSize);
            if (currentSize < 80) yesBtn.style.fontSize = (currentSize + 5) + "px";
        };

        noBtn.addEventListener("mouseover", moveButton);
        noBtn.addEventListener("touchstart", (e) => { e.preventDefault(); moveButton(); });

        yesBtn.addEventListener("click", () => {
            document.getElementById("mainContainer").style.display = "none";
            noBtn.style.display = "none";
            message.style.display = "block";
            setInterval(() => {
                const heart = document.createElement("div");
                heart.className = "heart";
                heart.innerHTML = ["🌸","💖","🧸","🍓"][Math.floor(Math.random()*4)];
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.top = "100vh";
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 200);
        });
    </script>
</body>
</html>
